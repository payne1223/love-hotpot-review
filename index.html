<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樂釜極上鍋物 - 專屬評論體驗</title>
    <style>
        :root {
            --primary-navy: #0F2537;       /* 樂釜沉穩深藍 */
            --accent-blue: #1E6BFF;        /* 亮點藍 */
            --light-blue-bg: #F0F5FF;     /* 選取時的輕奢藍 */
            --bg-gradient: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
            --card-shadow: 0 20px 40px rgba(15, 37, 55, 0.08);
            --text-title: #0F172A;
            --text-sub: #64748B;
            --border-default: #E2E8F0;
            --line-green: #06C755;         /* Line 品牌綠 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-title);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px 16px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: #FFFFFF;
            border-radius: 28px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .hero-banner {
            width: 100%;
            height: 180px;
            position: relative;
            background-color: var(--primary-navy);
            overflow: hidden;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content {
            padding: 24px 24px 32px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(30, 107, 255, 0.08);
            color: var(--accent-blue);
            font-size: 11px;
            font-weight: 700;
            border-radius: 100px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .brand-logo {
            display: block;
            max-width: 200px;
            width: 70%;
            height: auto;
            margin: 0 auto 8px auto;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-sub);
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary-navy);
            margin: 20px 0 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title .hint {
            font-size: 11px;
            color: #94A3B8;
            background: #F1F5F9;
            padding: 2px 8px;
            border-radius: 6px;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-radius: 14px;
            border: 2px solid var(--border-default);
            background: #FFFFFF;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-card input[type="radio"] {
            display: none;
        }

        .option-text {
            display: flex;
            flex-direction: column;
        }

        .main-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-title);
        }

        .sub-label {
            font-size: 12px;
            color: var(--text-sub);
        }

        .check-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #CBD5E1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .check-icon::after {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #FFFFFF;
            opacity: 0;
            transform: scale(0);
            transition: all 0.2s ease;
        }

        .option-card:has(input[type="radio"]:checked) {
            border-color: var(--accent-blue);
            background-color: var(--light-blue-bg);
        }

        .option-card input[type="radio"]:checked ~ .check-icon {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .option-card input[type="radio"]:checked ~ .check-icon::after {
            opacity: 1;
            transform: scale(1);
        }

        .result-box {
            margin-top: 24px;
            padding: 16px;
            background: #F8FAFC;
            border: 1.5px dashed #CBD5E1;
            border-radius: 16px;
        }

        .result-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary-navy);
            margin-bottom: 8px;
        }

        .review-text {
            font-size: 14px;
            color: #334155;
            line-height: 1.6;
            margin-bottom: 12px;
            background: #FFFFFF;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border-default);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--accent-blue);
            color: #FFFFFF;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(30, 107, 255, 0.25);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .line-card {
            margin-top: 20px;
            padding: 16px;
            background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
            border-radius: 16px;
            border: 1px solid #A5D6A7;
            text-align: center;
        }

        .line-title {
            font-size: 14px;
            font-weight: 800;
            color: #1B5E20;
            margin-bottom: 4px;
        }

        .line-desc {
            font-size: 12px;
            color: #2E7D32;
            margin-bottom: 12px;
        }

        .btn-line {
            width: 100%;
            padding: 12px;
            background: var(--line-green);
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(6, 199, 85, 0.2);
        }

        .detected-store {
            font-size: 11px;
            color: var(--text-sub);
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hero-banner">
            <img src="image.png" alt="樂釜美味視覺" class="hero-img">
        </div>

        <div class="content">
            <div class="header">
                <span class="brand-badge">Love Hotpot</span>
                <img src="logo.jpg" alt="樂釜極上鍋物 Logo" class="brand-logo">
                <p class="subtitle">1秒勾選，生成專屬美味記憶</p>
            </div>

            <!-- 問題 1 -->
            <div class="section-title">
                1. 今日吃了什麼美味？
                <span class="hint">單選</span>
            </div>
            <div class="option-group">
                <label class="option-card">
                    <input type="radio" name="food" value="極上黑毛和牛" data-desc="肉質鮮嫩入口即化" checked onchange="updateReview()">
                    <div class="option-text">
                        <span class="main-label">極上黑毛和牛</span>
                        <span class="sub-label">入口即化</span>
                    </div>
                    <div class="check-icon"></div>
                </label>
                
                <label class="option-card">
                    <input type="radio" name="food" value="鮮活蛤蜊海鮮" data-desc="海鮮非常飽滿肥美又新鮮" onchange="updateReview()">
                    <div class="option-text">
                        <span class="main-label">鮮活蛤蜊海鮮</span>
                        <span class="sub-label">飽滿肥美</span>
                    </div>
                    <div class="check-icon"></div>
                </label>

                <label class="option-card">
                    <input type="radio" name="food" value="頂級雪花牛" data-desc="份量紮實且肉厚多汁" onchange="updateReview()">
                    <div class="option-text">
                        <span class="main-label">頂級雪花牛</span>
                        <span class="sub-label">肉厚多汁</span>
                    </div>
                    <div class="check-icon"></div>
                </label>

                <label class="option-card">
                    <input type="radio" name="food" value="和牛美味拼盤" data-desc="湯頭甘甜搭配肉品超讚" onchange="updateReview()">
                    <div class="option-text">
                        <span class="main-label">和牛美味拼盤</span>
                        <span class="sub-label">湯頭甘甜</span>
                    </div>
                    <div class="check-icon"></div>
                </label>
            </div>

            <!-- 問題 2 -->
            <div class="section-title">
                2. 最滿意的體驗是？
                <span class="hint">單選</span>
            </div>
            <div class="option-group">
                <label class="option-card">
                    <input type="radio" name="exp" value="服務貼心" data-desc="店員親切且主動加湯服務超棒" checked onchange="updateReview()">
                    <div class="option-text">
                        <span class="main-label">服務貼心</span>
                        <span class="sub-label">親切、主動加湯</span>
                    </div>
                    <div class="check-icon"></div>
                </label>

                <label class="option-card">
                    <input type="radio" name="exp" value="環境質感" data-desc="用餐環境乾淨整潔又舒適" onchange="updateReview()">
                    <div class="option-text">
                        <span class="main-label">環境質感</span>
                        <span class="sub-label">乾淨整潔、無塵</span>
                    </div>
                    <div class="check-icon"></div>
                </label>
            </div>

            <!-- 自動生成的評論卡片 -->
            <div class="result-box">
                <div class="result-title">✨ 您的專屬評論文案已生成：</div>
                <div class="review-text" id="reviewContent">載文中...</div>
                <button class="btn-primary" onclick="copyAndRedirect()">
                    📋 複製評論並貼上至 Google
                </button>
                <div class="detected-store" id="storeName">喜歡這則評論嗎？歡迎幫我們複製並貼上至 Google 留下真實體驗～</div>
            </div>

            <!-- Line 會員導流卡片 -->
            <div class="line-card">
                <div class="line-title">🎁 樂釜專屬會員召集令</div>
                <div class="line-desc">加入 LINE 官方帳號，即刻領取【美食招待券】！</div>
                <a href="https://line.me/R/ti/p/@390wuxxp" target="_blank" class="btn-line">
                    💬 一鍵加入 LINE 領取好禮
                </a>
            </div>
        </div>
    </div>

    <script>
        // 直達各分店 Google「直接寫評論 (Direct Write Review)」網址
        const STORES = {
            'Shilin': { name: '樂釜極上鍋物 (芝山店)', url: 'https://www.google.com/maps/place/?q=place_id:ChIJS3-xxxx&action=write' },
            'Sanchong': { name: '樂釜極上鍋物 (重新店)', url: 'https://www.google.com/maps/search/?api=1&query=樂釜極上鍋物+重新店' },
            'Xinzhuang': { name: '樂釜極上鍋物 (新莊店)', url: 'https://www.google.com/maps/search/?api=1&query=樂釜極上鍋物+新莊店' },
            'Banqiao': { name: '樂釜極上鍋物 (板橋店)', url: 'https://www.google.com/maps/search/?api=1&query=樂釜極上鍋物+板橋店' },
            'Changhua': { name: '樂釜極上鍋物 (彰化店)', url: 'https://www.google.com/maps/search/?api=1&query=樂釜極上鍋物+彰化店' },
            'Default': { name: '樂釜極上鍋物', url: 'https://www.google.com/maps/search/?api=1&query=樂釜極上鍋物' }
        };

        let currentStoreUrl = STORES.Default.url;

        // 1. 動態生成評論文案
        function updateReview() {
            const selectedFood = document.querySelector('input[name="food"]:checked');
            const selectedExp = document.querySelector('input[name="exp"]:checked');

            const foodName = selectedFood.value;
            const foodDesc = selectedFood.getAttribute('data-desc');
            const expDesc = selectedExp.getAttribute('data-desc');

            const templates = [
                `今天來樂釜用餐體驗太棒了！點了${foodName}，${foodDesc}。整體${expDesc}，值得推薦！`,
                `超推樂釜的${foodName}！${foodDesc}，而且${expDesc}，是聚餐的首選火鍋店！`,
                `第一次來樂釜就被圈粉，${foodName}${foodDesc}，加上${expDesc}，讓人留下很深刻的美味記憶！`
            ];

            const randomText = templates[Math.floor(Math.random() * templates.length)];
            document.getElementById('reviewContent').innerText = randomText;
        }

        // 2. 依位置判斷分店
        async function detectLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                const city = (data.city || '').toLowerCase();
                const region = (data.region || '').toLowerCase();

                if (city.includes('changhua') || region.includes('changhua')) {
                    currentStoreUrl = STORES.Changhua.url;
                } else if (city.includes('banqiao')) {
                    currentStoreUrl = STORES.Banqiao.url;
                } else if (city.includes('xinzhuang')) {
                    currentStoreUrl = STORES.Xinzhuang.url;
                } else if (city.includes('sanchong')) {
                    currentStoreUrl = STORES.Sanchong.url;
                } else {
                    currentStoreUrl = STORES.Default.url;
                }
            } catch (e) {
                currentStoreUrl = STORES.Default.url;
            }
        }

        // 3. 一鍵複製並直達 Google 評論頁
        function copyAndRedirect() {
            const text = document.getElementById('reviewContent').innerText;
            
            navigator.clipboard.writeText(text).then(() => {
                alert('已為您複製評論！即將前往 Google 評論頁面，直接貼上即可～感謝您的支持！');
                window.open(currentStoreUrl, '_blank');
            }).catch(err => {
                alert('已為您準備好連結！請手動複製文字後前往貼上～');
                window.open(currentStoreUrl, '_blank');
            });
        }

        // 初始化
        window.onload = function() {
            updateReview();
            detectLocation();
        };
    </script>
</body>
</html>
